<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fafafa;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected    { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .status-label { flex: 1; font-weight: 500; }
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-green   { background: #22c55e; color: #fff; }
    .btn-red     { background: #ef4444; color: #fff; }
    .btn-blue    { background: #3b82f6; color: #fff; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
      line-height: 1.4;
    }
    .log {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      max-height: 160px;
      overflow-y: auto;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 6px;
      padding: 8px;
    }
    .log-line { margin: 1px 0; line-height: 1.5; }
    .log-line.ok  { color: #4ade80; }
    .log-line.err { color: #f87171; }
    .log-line.dim { color: #888; }
    .socket-path {
      font-family: monospace;
      font-size: 11px;
      background: #f0f4ff;
      border: 1px solid #c7d7fa;
      border-radius: 4px;
      padding: 4px 8px;
      word-break: break-all;
      color: #3730a3;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>🤖 Klawed Browser Controller</h1>

  <div class="card">
    <div class="status-row">
      <div class="dot disconnected" id="dot"></div>
      <span class="status-label" id="statusLabel">Disconnected</span>
      <button class="btn btn-green" id="connectBtn">Connect</button>
    </div>
    <div class="hint" id="hint">Click Connect to link this browser to the Klawed native host.</div>
    <div class="socket-path" id="socketPath">Socket: /tmp/klawed-browser.sock</div>
  </div>

  <div class="card">
    <div style="font-weight:500;margin-bottom:6px">Quick Actions</div>
    <div class="grid">
      <button class="btn btn-blue" id="btnPageInfo"  disabled>Page Info</button>
      <button class="btn btn-blue" id="btnListTabs"  disabled>List Tabs</button>
      <button class="btn btn-blue" id="btnScreenshot" disabled>Screenshot</button>
      <button class="btn btn-blue" id="btnGetText"   disabled>Get Text</button>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:500;margin-bottom:6px">Log</div>
    <div class="log" id="log"><div class="log-line dim">Ready.</div></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
