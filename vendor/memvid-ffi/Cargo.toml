[package]
name = "memvid-ffi"
version = "0.1.0"
edition = "2021"
rust-version = "1.70.0"
license = "Apache-2.0"
description = "C FFI bindings for memvid-core - AI memory storage"
repository = "https://github.com/memvid/memvid"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
memvid-core = { version = "2.0.131", features = ["lex"] }
serde_json = "1.0"
libc = "0.2"

[features]
default = ["lex"]
lex = []
